
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Homebrew God Character-Creator Self-Tests</title>
</head>
<body data-test-status="running">
  <h1>Character-Creator Rules Self-Tests</h1>
  <pre id="result" role="status">RUNNING</pre>

  <script>
    window.alert = () => {};
    window.confirm = () => false;
  </script>
  <script type="importmap">
    {
      "imports": {
        "../characterCreator.fixed.js": "../characterCreator.fixed.js?v=phase8-20260723",
        "../characterSheet.js": "../characterSheet.js?v=phase8-20260723",
        "../defaultClasses.js": "../defaultClasses.js?v=phase8-20260723",
        "../defaultClassFeatureCatalog.js": "../defaultClassFeatureCatalog.js?v=phase8-20260723",
        "../defaultClassFeatureRules.js": "../defaultClassFeatureRules.js?v=phase8-20260723",
        "../defaultSubclassCatalog.js": "../defaultSubclassCatalog.js?v=phase8-20260723",
        "../defaultSubclassNames.js": "../defaultSubclassNames.js?v=phase8-20260723",
        "../defaultSubclasses.js": "../defaultSubclasses.js?v=phase8-20260723",
        "../defaultFeats.js": "../defaultFeats.js?v=phase8-20260723",
        "../defaultSpells.js": "../defaultSpells.js?v=phase8-20260723",
        "../ruleset2014.js": "../ruleset2014.js?v=phase8-20260723"
      }
    }
  </script>
  <script type="module">
    import { createCharacterCreator } from "../characterCreator.fixed.js";

    const output = document.getElementById("result");

    try {
      const creator = createCharacterCreator();
      const result = creator.runRulesSelfTests();
      document.body.dataset.testStatus = result.passed ? "pass" : "fail";
      output.textContent = JSON.stringify(result, null, 2);

      if (!result.passed) {
        throw new Error(`${result.failed.length} of ${result.total} self-tests failed`);
      }
    } catch (error) {
      document.body.dataset.testStatus = "fail";
      output.textContent =
        output.textContent === "RUNNING"
          ? `FAIL\n${error?.stack || error}`
          : `${output.textContent}\n\nFAIL\n${error?.stack || error}`;
      throw error;
    }
  </script>
</body>
</html>
